---
layout: home
---

<script>
document.addEventListener('DOMContentLoaded', async function () {
  if (!(location.pathname === '/' || location.pathname === '/index.html')) return;

  const footer = document.querySelector('#tail-wrapper') || document.querySelector('footer')?.parentElement;
  const main = document.querySelector('#main-wrapper .content') || document.querySelector('#main-wrapper');

  if (!main) return;

  const panel = document.createElement('section');
  panel.className = 'homepage-site-stats';
  panel.innerHTML = `
    <h2 class="stats-title">站点统计</h2>
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-label">首页访问量</div>
        <div class="stats-value" id="homepage-view-count">--</div>
      </div>
      <div class="stats-card">
        <div class="stats-label">文章总数</div>
        <div class="stats-value">{{ site.posts | size }}</div>
      </div>
      <div class="stats-card">
        <div class="stats-label">标签数</div>
        <div class="stats-value">{{ site.tags | size }}</div>
      </div>
    </div>
  `;

  if (footer && footer.parentNode) {
    footer.parentNode.insertBefore(panel, footer);
  } else {
    main.appendChild(panel);
  }

  try {
    const goatId = 'hunsil';
    const res = await fetch(`https://${goatId}.goatcounter.com/counter/%2F.json`);
    const data = await res.json();
    document.getElementById('homepage-view-count').textContent =
      data.count ?? data.visits ?? '--';
  } catch (e) {
    document.getElementById('homepage-view-count').textContent = '--';
  }
});
</script>
